version: 2

python:

build:
  os: ubuntu-26.04
  tools:
    python: "3.14"

python:
  install:
    - method: uv
      command: sync --frozen
      groups:
        - doc
  
sphinx:
  configuration: docs/conf.py
  fail_on_warning: true